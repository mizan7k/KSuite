name: Build and Release Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant Execute Permission for Gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew wrapper not found in repository, will use system gradle instead."
        fi

    - name: Create Environment File
      run: |
        if [ ! -f .env.example ]; then
          echo "Creating dummy .env.example because it was not found..."
          touch .env.example
        fi
        if [ ! -f .env ]; then
          echo "Creating .env..."
          cp .env.example .env
        fi

    - name: Set up Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding keystore from base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, generating a new debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
        fi

    - name: Build Debug APK
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug --no-daemon
        else
          gradle assembleDebug --no-daemon
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ksuite-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 14
